# Release: manual multi-platform build + release publish
# Manually trigger this workflow (Actions -> Run workflow).
#
# The "create-release" job uses an environment called "release" which you
# should protect in repository settings (Settings → Environments → Add
# 'release' and require one or more reviewers). That enforces a manual
# approval step before the release is created.

name: Release (multi-platform)

# Manual trigger
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag for the release (e.g. v1.2.3)'
        required: true
        default: ''
      name:
        description: 'Release name (optional)'
        required: false
        default: ''
      body:
        description: 'Release notes/body (optional)'
        required: false
        default: ''
      draft:
        description: 'Create release as draft'
        required: false
        default: 'false'
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: 'false'

permissions:
  contents: write    # required to create releases and upload assets

concurrency:
  group: release-${{ github.ref }}-${{ github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

env:
  GOFLAGS: "-mod=vendor"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # linux
          - name: linux_amd64
            goos: linux
            goarch: amd64
            goarm: ""
            ext: ""
          - name: linux_arm64
            goos: linux
            goarch: arm64
            goarm: ""
            ext: ""
          - name: linux_386
            goos: linux
            goarch: 386
            goarm: ""
            ext: ""
          - name: linux_armv7
            goos: linux
            goarch: arm
            goarm: "7"
            ext: ""
          - name: linux_armv6
            goos: linux
            goarch: arm
            goarm: "6"
            ext: ""
          - name: linux_ppc64le
            goos: linux
            goarch: ppc64le
            goarm: ""
            ext: ""
          - name: linux_s390x
            goos: linux
            goarch: s390x
            goarm: ""
            ext: ""
          # macOS
          - name: darwin_amd64
            goos: darwin
            goarch: amd64
            goarm: ""
            ext: ""
          - name: darwin_arm64
            goos: darwin
            goarch: arm64
            goarm: ""
            ext: ""
          # Windows
          - name: windows_amd64
            goos: windows
            goarch: amd64
            goarm: ""
            ext: ".exe"
          - name: windows_386
            goos: windows
            goarch: 386
            goarm: ""
            ext: ".exe"
          # BSD
          - name: freebsd_amd64
            goos: freebsd
            goarch: amd64
            goarm: ""
            ext: ""
          - name: openbsd_amd64
            goos: openbsd
            goarch: amd64
            goarm: ""
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Cache Go Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Prepare dist dir
        run: mkdir -p dist

      - name: Build (cross-compile)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          set -e
          echo "Building for $GOOS / $GOARCH (GOARM=$GOARM)"
          filename="dns-mirror_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
          # Ensure we pass GOARM only when applicable
          if [ -n "$GOARM" ]; then
            env GOOS=$GOOS GOARCH=$GOARCH GOARM=$GOARM CGO_ENABLED=$CGO_ENABLED go build -ldflags="-s -w" -o dist/${filename} ./...
          else
            env GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=$CGO_ENABLED go build -ldflags="-s -w" -o dist/${filename} ./...
          fi
          # Add a small SHA info file next to binary
          echo "${{ github.sha }}" > dist/${filename}.gitsha
          chmod +x dist/${filename} || true
          ls -lh dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  create-release:
    name: Create Release (publish)
    runs-on: ubuntu-latest
    needs: build
    # Protect this job with an environment to require manual approval before it runs.
    # In your repo settings, create an environment named `release` and require reviewers.
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v3
        with:
          path: dist

      - name: List artifacts
        run: |
          echo "Contents of dist:"
          ls -la dist || true
          find dist -maxdepth 1 -type f -print

      - name: Create GitHub Release and upload assets
        # Using ncipollo/release-action to create (or update) a release and upload multiple files
        # It handles creating the tag if it doesn't exist.
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.name }}
          body: ${{ github.event.inputs.body }}
          draft: ${{ github.event.inputs.draft }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: dist/*

      - name: Done
        run: echo "Release created/updated with artifacts."
